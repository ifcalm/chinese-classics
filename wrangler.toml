name = "chinese-classics"
compatibility_date = "2025-06-01"
main = "src/worker.ts"

# Worker 托管 React 构建产物（SPA 深链回退 index.html），并把 /content/* 代理到 R2。
# run_worker_first = true：一切请求先进 Worker。不设时 `/` 精确命中资产 index.html
# 会被资产层直接应答、绕过 Worker，首页得不到边缘渲染；设成数组(仅列 "/")更糟——
# 未列出的路径全部降级为资产层兜底，/content 代理与 /read SSR 全部失效(2026-07-16 实测)。
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[r2_buckets]]
binding = "BOOKS"
bucket_name = "chinese-classics"

# 名句库（首页随机名句）。git 的 data/quotes.json 是唯一源：
# 改动走 scripts/sync-quotes-d1.mjs 全量重建，永远不要手改 D1。
# Worker 里绑定可缺省——D1 不可用时 /api/quotes/random 自动回退 R2 quotes.json。
[[d1_databases]]
binding = "QUOTES_DB"
database_name = "chinese-classics-quotes"
database_id = "6a5fc70a-b029-401d-ad8d-d6e34fd6eed2"

# Workers Logs：/api/err 上报的前端错误经 console.error 落到这里
# (控制台 Workers → chinese-classics → Logs 查看；免费档 20 万条/天、留 3 天)
[observability]
enabled = true
